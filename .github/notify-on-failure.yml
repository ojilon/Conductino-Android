name: Notify on CI Failure

on:
  workflow_run:
    workflows: [ "Android CI/CD Pipeline" ]
    types: [ completed ]

permissions:
  contents: read

jobs:
  notify-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get workflow run details
        id: workflow
        run: |
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "run_number=${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          echo "commit=${{ github.event.workflow_run.head_commit }}" >> $GITHUB_OUTPUT

      - name: Log failure details
        run: |
          echo "❌ Android CI/CD Pipeline Failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Run #: ${{ steps.workflow.outputs.run_number }}"
          echo "Branch: ${{ steps.workflow.outputs.branch }}"
          echo "Commit: ${{ steps.workflow.outputs.commit }}"
          echo ""
          echo "🔗 View logs: https://github.com/${{ github.repository }}/actions/runs/${{ steps.workflow.outputs.run_id }}"
          echo ""
          echo "Possible issues:"
          echo "  • Compilation errors in Java/C code"
          echo "  • Native library (JNI) initialization failure"
          echo "  • Missing layout resources (activity_browser.xml)"
          echo "  • Missing asset files in assets/ui/"
          echo "  • Unit test assertion failures"