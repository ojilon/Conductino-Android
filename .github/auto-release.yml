name: Auto Release on Test Pass

on:
  workflow_run:
    workflows: [ "Android CI/CD Pipeline" ]
    types: [ completed ]
    branches: [ main ]

permissions:
  contents: write
  actions: read

jobs:
  auto-release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: android-test.yml
          workflow_conclusion: success
          name: release-apk
          path: ./artifacts/

      - name: Get version from build.gradle
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | grep -oP '"\K[^"]*')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_TAG="v${VERSION}-${TIMESTAMP}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release version: $RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }} - ${{ github.run_number }}
          body: |
            ## 🎉 Automated Release
            
            **Build #:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            ✅ All tests passed
            📦 APK attached below
            
            ### Download
            - `app-release-unsigned.apk` - Ready for signing and distribution
            
            ---
            *Generated by GitHub Actions*
          files: ./artifacts/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send success notification
        run: |
          echo "✅ Release created: ${{ steps.version.outputs.tag }}"
          echo "📦 APKs available in Releases tab"