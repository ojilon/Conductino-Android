<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurora — Offline</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <style>
    .err { min-height:100%; display:flex; flex-direction:column; justify-content:center;
      gap:16px; padding:32px; max-width:520px; margin:0 auto; }
    .err .code { font-family:var(--font-display); color:var(--accent); }
    .err button { align-self:flex-start; background:var(--accent); color:var(--bg);
      border:0; border-radius:999px; padding:12px 22px; font-size:15px; }
  </style>
</head>
<body>
  <main class="err">
    <div class="code" id="code">ERR</div>
    <h1 id="title">Something went wrong</h1>
    <p id="detail" style="color:var(--muted)"></p>
    <button onclick="Aurora.submit(document.getElementById('u').value)">Retry</button>
    <input type="hidden" id="u" />
  </main>
  <script src="../shared/aurora-api.js"></script>
  <script>
    Aurora.ready('error');
    Aurora.on('payload', (d) => {
      document.getElementById('code').textContent = 'ERR ' + (d.status || '');
      document.getElementById('detail').textContent = d.error || d.url || '';
      document.getElementById('u').value = d.url || '';
    });
  </script>
</body>
</html>
